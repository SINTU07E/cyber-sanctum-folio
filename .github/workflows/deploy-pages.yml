name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build static site
        env:
          STATIC_BUILD: "1"
          # For a project site at https://<user>.github.io/<repo>/ set BASE_PATH to "/<repo>/".
          # For a user/org site (<user>.github.io) or a custom domain, leave BASE_PATH as "/".
          BASE_PATH: ${{ vars.BASE_PATH || '/' }}
        run: bun run build
      - name: Add SPA fallback + .nojekyll
        run: |
          touch dist/.nojekyll
          cp dist/index.html dist/404.html || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
